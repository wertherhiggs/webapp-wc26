<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ m.open }}" style="background:{{ c.card }};border:0.5px solid {{ c.border }};border-radius:24px;padding:16px;display:flex;flex-direction:column;gap:14px;cursor:pointer;font-family:'Noto Sans',sans-serif">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
    <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;background:{{ m.statusBg }};color:{{ m.statusColor }}">
      <sc-if value="{{ m.isLive }}" hint-placeholder-val="{{ true }}"><span style="width:6px;height:6px;border-radius:999px;background:#fff;display:inline-block"></span></sc-if>
      {{ m.statusLabel }}
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <sc-if value="{{ m.rai }}" hint-placeholder-val="{{ false }}"><span style="padding:4px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;background:#2D9E4A;color:#fff;white-space:nowrap">In chiaro RAI</span></sc-if>
      <span style="display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;background:{{ c.surface }};color:{{ c.text }};font-size:12px;font-weight:700;white-space:nowrap">
        <span style="width:7px;height:7px;border-radius:2px;background:{{ m.channel.color }};display:inline-block"></span>{{ m.channel.name }}
      </span>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:9px">
      <div style="{{ m.home.flag }}"></div>
      <span style="font-size:14px;font-weight:700;color:{{ c.text }}">{{ m.home.code }}</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <sc-if value="{{ m.showScore }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:center;gap:10px;background:#111111;border-radius:12px;padding:7px 16px">
          <span style="font-size:28px;font-weight:900;color:#F4C94B;line-height:1">{{ m.hs }}</span>
          <span style="font-size:18px;font-weight:700;color:#5A5A56">-</span>
          <span style="font-size:28px;font-weight:900;color:#F4C94B;line-height:1">{{ m.as }}</span>
        </div>
      </sc-if>
      <sc-if value="{{ m.showTime }}" hint-placeholder-val="{{ false }}">
        <span style="font-size:9px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:{{ c.muted }}">Ora italiana</span>
        <span style="font-size:30px;font-weight:900;letter-spacing:-0.02em;color:{{ c.text }};line-height:1">{{ m.time }}</span>
      </sc-if>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:9px">
      <div style="{{ m.away.flag }}"></div>
      <span style="font-size:14px;font-weight:700;color:{{ c.text }}">{{ m.away.code }}</span>
    </div>
  </div>
  <sc-if value="{{ m.hasFooter }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex;justify-content:space-between;gap:8px;padding-top:11px;border-top:0.5px solid {{ c.border }}">
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-start">
        <sc-for list="{{ m.scorersHome }}" as="s" hint-placeholder-count="1"><span style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:{{ c.muted }}"><span style="width:5px;height:5px;border-radius:999px;background:#A8E040;display:inline-block"></span>{{ s.name }} {{ s.min }}</span></sc-for>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <sc-for list="{{ m.scorersAway }}" as="s" hint-placeholder-count="1"><span style="display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:{{ c.muted }}">{{ s.name }} {{ s.min }}<span style="width:5px;height:5px;border-radius:999px;background:#A8E040;display:inline-block"></span></span></sc-for>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:358,&quot;height&quot;:172},&quot;m&quot;:{&quot;editor&quot;:null},&quot;c&quot;:{&quot;editor&quot;:null}}"></script>
</body>
</html>
